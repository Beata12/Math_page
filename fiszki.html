<!doctype html>
<html lang="pl">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Interaktywne Fiszki Matematyczne - Klasa 5</title>
		<link rel="stylesheet" href="css/style_fiszki.css" />
		<script src="https://cdn.tailwindcss.com"></script>
	</head>
	<body class="bg-slate-50 min-height-screen text-slate-800">
		<div class="max-w-4xl mx-auto px-4 py-8">
			<!-- Header -->
			<header class="text-center mb-10">
				<h1 class="text-4xl font-extrabold text-blue-600 mb-2">
					Matematyczne Wyzwanie
				</h1>
				<p class="text-slate-600 text-lg">
					Fiszki interaktywne dla klasy 5
				</p>
			</header>
			<div
				id="category-menu"
				class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-10"
			>
				<!-- Buttons generated by JS -->
			</div>

			<!-- Flashcard View -->
			<div id="flashcard-section" class="hidden">
				<div class="flex justify-between items-center mb-6">
					<button
						onclick="showMenu()"
						class="text-blue-600 font-semibold flex items-center hover:underline"
					>
						← Powrót do menu
					</button>
					<span
						id="category-label"
						class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-bold uppercase tracking-wide"
					></span>
				</div>

				<div class="flex flex-col items-center">
					<!-- Card Container -->
					<div
						id="card-container"
						class="flip-card w-full max-w-md h-64 mb-8"
					>
						<div
							class="flip-card-inner"
							onclick="
								this.parentElement.classList.toggle('flipped')
							"
						>
							<div class="flip-card-front">
								<p
									id="card-question"
									class="text-2xl font-medium"
								></p>
							</div>
							<div class="flip-card-back">
								<p
									id="card-answer"
									class="text-2xl font-bold"
								></p>
							</div>
						</div>
					</div>

					<!-- Controls -->
					<div class="flex items-center space-x-6">
						<button
							onclick="prevCard()"
							class="p-3 rounded-full bg-white border border-slate-200 hover:bg-slate-100 transition shadow-sm"
						>
							<svg
								xmlns="http://www.w3.org/2000/svg"
								width="24"
								height="24"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<path d="m15 18-6-6 6-6" />
							</svg>
						</button>
						<span
							id="progress-text"
							class="text-slate-500 font-medium"
							>1 / 10</span
						>
						<button
							onclick="nextCard()"
							class="p-3 rounded-full bg-white border border-slate-200 hover:bg-slate-100 transition shadow-sm"
						>
							<svg
								xmlns="http://www.w3.org/2000/svg"
								width="24"
								height="24"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<path d="m9 18 6-6-6-6" />
							</svg>
						</button>
					</div>
				</div>
			</div>
		</div>

		<script>
			const flashcardData = {
				"Liczby naturalne": [
					{ q: "Jak nazywamy wynik dodawania?", a: "Suma" },
					{ q: "Liczba o 5 większa od 12 to...", a: "17" },
					{ q: "Iloczyn to wynik jakiego działania?", a: "Mnożenia" },
					{ q: "Liczba rzymska 'X' to...", a: "10" },
					{ q: "Liczba rzymska 'L' to...", a: "50" },
				],
				"Figury geometryczne": [
					{ q: "Ile stopni ma kąt prosty?", a: "90°" },
					{ q: "Kąt o mierze 180° nazywamy...", a: "Półpełny" },
					{ q: "Suma kątów w trójkącie wynosi...", a: "180°" },
					{
						q: "Czworokąt, który ma wszystkie boki równe i kąty proste to...",
						a: "Kwadrat",
					},
					{ q: "Ile stopni ma kąt ostry?", a: "Mniej niż 90°" },
				],
				"Dodawanie i odejmowanie pisemne": [
					{
						q: "Gdzie dopisujemy brakujące cyfry przy odejmowaniu?",
						a: "Nad cyfrą (pożyczanie)",
					},
					{ q: "256 + 144 = ?", a: "400" },
					{ q: "1000 - 350 = ?", a: "650" },
					{
						q: "Czy przy dodawaniu pisemnym rzędy muszą być pod sobą?",
						a: "Tak (jedności pod jednościami)",
					},
				],
				"Mnożenie i dzielenie pisemne": [
					{ q: "12 × 5 = ?", a: "60" },
					{ q: "100 : 4 = ?", a: "25" },
					{
						q: "Mnożenie przez 10 dodaje do liczby...",
						a: "Jedno zero",
					},
					{
						q: "Liczba dzielona przez 1 to zawsze...",
						a: "Ta sama liczba",
					},
				],
				"Ułamki zwykłe": [
					{ q: "Liczba nad kreską ułamkową to...", a: "Licznik" },
					{ q: "Ułamek 2/4 po skróceniu to...", a: "1/2" },
					{
						q: "Ułamek o tym samym liczniku i mianowniku jest równy...",
						a: "1 (całość)",
					},
					{ q: "Co jest większe: 1/2 czy 1/3?", a: "1/2" },
				],
				"Ułamki dziesiętne": [
					{ q: "Zapisz ułamek 1/2 jako dziesiętny", a: "0,5" },
					{ q: "Ile to 0,1 + 0,2?", a: "0,3" },
					{ q: "Zapisz słownie: 0,05", a: "Pięć setnych" },
					{ q: "0,4 czy 0,39 - co jest większe?", a: "0,4" },
				],
				Zegar: [
					{ q: "Ile minut ma godzina?", a: "60 minut" },
					{ q: "Kwadrans to ile minut?", a: "15 minut" },
					{
						q: "Zegar wskazuje 15:45. Która to godzina po południu?",
						a: "Za piętnaście czwarta",
					},
					{ q: "Ile sekund ma minuta?", a: "60 sekund" },
				],
				Kalendarz: [
					{ q: "Który miesiąc ma 28 lub 29 dni?", a: "Luty" },
					{ q: "Ile dni ma rok przestępny?", a: "366 dni" },
					{ q: "Ile tygodni ma rok?", a: "Około 52" },
					{ q: "Jaki miesiąc następuje po lipcu?", a: "Sierpień" },
				],
				"Pola figur": [
					{ q: "Wzór na pole kwadratu (bok a)", a: "P = a × a" },
					{
						q: "Wzór na pole prostokąta (boki a, b)",
						a: "P = a × b",
					},
					{ q: "Pole kwadratu o boku 3 cm wynosi...", a: "9 cm²" },
					{
						q: "Pole prostokąta o bokach 2 cm i 5 cm...",
						a: "10 cm²",
					},
				],
			};

			let currentCategory = "";
			let currentIndex = 0;

			function initMenu() {
				const menu = document.getElementById("category-menu");
				Object.keys(flashcardData).forEach((cat) => {
					const btn = document.createElement("button");
					btn.className =
						"bg-white p-6 rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-blue-300 transition-all text-left group";
					btn.onclick = () => startFlashcards(cat);
					btn.innerHTML = `
                    <h3 class="font-bold text-slate-800 group-hover:text-blue-600 transition-colors">${cat}</h3>
                    <p class="text-xs text-slate-400 mt-1">${flashcardData[cat].length} fiszek</p>
                `;
					menu.appendChild(btn);
				});
			}

			function startFlashcards(category) {
				currentCategory = category;
				currentIndex = 0;
				document
					.getElementById("category-menu")
					.classList.add("hidden");
				document
					.getElementById("flashcard-section")
					.classList.remove("hidden");
				document.getElementById("category-label").innerText = category;
				updateCard();
			}

			function showMenu() {
				document
					.getElementById("category-menu")
					.classList.remove("hidden");
				document
					.getElementById("flashcard-section")
					.classList.add("hidden");
			}

			function updateCard() {
				const card = document.getElementById("card-container");
				card.classList.remove("flipped");

				const data = flashcardData[currentCategory][currentIndex];

				// Wait for flip back animation if it was flipped
				setTimeout(() => {
					document.getElementById("card-question").innerText = data.q;
					document.getElementById("card-answer").innerText = data.a;
					document.getElementById("progress-text").innerText =
						`${currentIndex + 1} / ${flashcardData[currentCategory].length}`;
				}, 100);
			}

			function nextCard() {
				if (currentIndex < flashcardData[currentCategory].length - 1) {
					currentIndex++;
					updateCard();
				} else {
					// Wrap around or show finished message
					currentIndex = 0;
					updateCard();
				}
			}

			function prevCard() {
				if (currentIndex > 0) {
					currentIndex--;
					updateCard();
				}
			}

			// Initialize on load
			window.onload = initMenu;
		</script>
	</body>
</html>
